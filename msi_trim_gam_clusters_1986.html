const SVG_NS="http://www.w3.org/2000/svg";
const SVG_TAGS=new Set(["svg","line","text","polyline","circle","rect"]);

function el(tag,attrs,children){
  const e=SVG_TAGS.has(tag)?document.createElementNS(SVG_NS,tag):document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>k==="style"?Object.assign(e.style,v):e.setAttribute(k==="className"?"class":k,v));
  function append(child){
    if(child==null)return;
    if(Array.isArray(child)){child.forEach(append);return;}
    if(child instanceof Node){e.appendChild(child);return;}
    e.appendChild(document.createTextNode(String(child)));
  }
  append(children);
  return e;
}

function renderChart(containerId,config){
  const container=document.getElementById(containerId);
  container.innerHTML="";
  const labels=config.labels||[];
  const datasets=(config.datasets||[]).filter(ds=>ds.data.some(Number.isFinite));
  if(!labels.length||!datasets.length){container.appendChild(el("div",{className:"msg"},"Geen gegevens beschikbaar."));return;}
  const width=980,height=430,margin={top:24,right:24,bottom:58,left:64};
  const innerW=width-margin.left-margin.right,innerH=height-margin.top-margin.bottom;
  const values=datasets.flatMap(ds=>ds.data).filter(Number.isFinite);
  let min=Math.min(...values),max=Math.max(...values);
  const pad=(max-min||1)*0.08;min-=pad;max+=pad;
  const xAt=i=>margin.left+(labels.length===1?innerW/2:i*(innerW/(labels.length-1)));
  const yAt=v=>margin.top+innerH-((v-min)/(max-min))*innerH;
  const svg=el("svg",{class:"chart-svg",viewBox:`0 0 ${width} ${height}`,preserveAspectRatio:"none"});
  svg.appendChild(el("rect",{x:margin.left,y:margin.top,width:innerW,height:innerH,rx:8,class:"chart-frame"}));
  for(let i=0;i<5;i++){
    const value=min+((max-min)/4)*i,y=yAt(value);
    svg.appendChild(el("line",{x1:margin.left,y1:y,x2:width-margin.right,y2:y,class:"chart-grid"}));
    svg.appendChild(el("text",{x:margin.left-8,y:y+4,"text-anchor":"end",class:"chart-label"},value.toLocaleString("nl-NL",{maximumFractionDigits:0})));
  }
  svg.appendChild(el("line",{x1:margin.left,y1:margin.top,x2:margin.left,y2:height-margin.bottom,class:"chart-axis"}));
  svg.appendChild(el("line",{x1:margin.left,y1:height-margin.bottom,x2:width-margin.right,y2:height-margin.bottom,class:"chart-axis"}));
  const xStep=Math.max(1,Math.ceil(labels.length/10));
  labels.forEach((label,i)=>{if(i%xStep===0||i===labels.length-1)svg.appendChild(el("text",{x:xAt(i),y:height-margin.bottom+20,"text-anchor":"middle",class:"chart-label"},label));});
  svg.appendChild(el("text",{x:16,y:height/2,transform:`rotate(-90 16 ${height/2})`,class:"chart-title","text-anchor":"middle"},"Index (1986 = 100)"));
  datasets.forEach(ds=>{
    const points=ds.data.map((v,i)=>Number.isFinite(v)?`${xAt(i)},${yAt(v)}`:null).filter(Boolean);
    svg.appendChild(el("polyline",{points:points.join(" "),class:"chart-line",stroke:ds.color,"stroke-width":"3"}));
  });
  container.appendChild(svg);
  container.appendChild(el("div",{className:"chart-legend"},datasets.map(ds=>el("div",{className:"legend-item"},[
    el("span",{className:"legend-line",style:{borderTopColor:ds.color}}),
    el("span",{},ds.label)
  ]))));
}
