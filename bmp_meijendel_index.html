<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>

<title>BMP data Meijendel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9fafb;color:#1f2937}
.header{background:#15803d;color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700}

.btn-file{cursor:pointer;font-size:13px;color:#bbf7d0;border:1px solid #4ade80;border-radius:6px;padding:6px 12px;background:none}
.main{padding:24px;max-width:980px;margin:0 auto}
.idle{text-align:center;padding:80px 0}
.idle h2{font-size:18px;font-weight:500;color:#374151;margin-bottom:8px}
.idle p{font-size:14px;color:#9ca3af;margin-bottom:32px}
.btn-load{cursor:pointer;background:#16a34a;color:white;padding:12px 32px;border-radius:12px;font-size:14px;font-weight:500;border:none}
.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:16px;text-align:center}
.stat-card .icon{font-size:22px;margin-bottom:4px}
.stat-card .val{font-size:20px;font-weight:700}
.stat-card .lbl{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
.tabs{display:flex;gap:4px;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:4px;width:fit-content;margin-bottom:20px}
.tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:transparent;color:#6b7280}
.tab.active{background:#16a34a;color:white}
.panel{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:20px}
.panel h2{font-weight:600;color:#374151;margin-bottom:16px}
.metric-toggle{display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:4px}
.metric-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:transparent;color:#6b7280}

details{margin-bottom:10px}
summary{cursor:pointer;font-size:12px;font-weight:500;border-radius:8px;padding:8px 12px;list-style:none;user-select:none}

.filter-body{margin-top:6px;padding:12px;border-radius:8px}
.filter-blue .filter-body{background:#eff6ff;border:1px solid #bfdbfe}
.filter-gray .filter-body{background:#f9fafb;border:1px solid #e5e7eb}
.pill-wrap{display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow-y:auto}
.pill{padding:3px 12px;border-radius:999px;font-size:12px;border:1px solid #d1d5db;background:white;color:#6b7280;cursor:pointer}
.pill.active-blue{background:#1d4ed8;color:white;border-color:#1d4ed8}
.pill.active-green{background:#16a34a;color:white;border-color:#16a34a}
.badge{margin-left:8px;padding:2px 8px;border-radius:999px;font-size:11px}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-green{background:#d1fae5;color:#065f46}
.reset-btn{font-size:12px;color:#9ca3af;background:none;border:none;cursor:pointer}
.species-pills{display:flex;flex-wrap:wrap;gap:6px}
.year-row{display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap}
.year-row label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px}
.year-row select{border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;font-size:14px}
.empty-msg{text-align:center;color:#9ca3af;font-style:italic;padding:32px 0;font-size:14px}
.chart-wrap{position:relative;width:100%;height:360px;padding:8px 0}
.chart-svg{width:100%;height:100%;display:block}
.chart-axis{stroke:#94a3b8;stroke-width:1.2}

.chart-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:14px;background:#f9fafb;border-radius:8px}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#4b5563}
.legend-line{width:18px;height:0;border-top:3px solid #000;border-radius:999px}
.legend-dashed{border-top-style:dashed}
.chart-frame{fill:#ffffff;stroke:#e5e7eb;stroke-width:1}
.teller-card{border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
.teller-name{font-weight:600;font-size:15px;color:#1f2937}
.teller-code{font-size:12px;color:#9ca3af}
.teller-contact{font-size:13px;color:#4b5563;margin-top:4px}
.teller-contact a{color:#15803d}
table.kavel-tbl{font-size:12px;width:100%;border-collapse:collapse;margin-top:8px}

table.kavel-tbl td{padding:4px 8px;border-bottom:1px solid #f3f4f6}
.kavel-badge{background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:999px;font-size:11px;display:inline-block;margin:2px}
.search-box{width:100%;max-width:360px;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;margin-bottom:6px;outline:none}
.found-count{font-size:12px;color:#9ca3af;margin-bottom:16px}
.spinner{text-align:center;padding:80px 0;color:#6b7280}

.schema-wrap{margin-top:24px}
.schema-tbl{font-size:12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:6px}

.upload-row{display:flex;align-items:center;gap:12px;padding:12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px}
.upload-btn{cursor:pointer;background:#16a34a;color:white;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}
.interp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.advies-badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500;margin-bottom:8px}

.advies-lin{background:#d1fae5;color:#065f46}

  .header{flex-direction:column;align-items:flex-start;gap:12px}
  .stat-cards{grid-template-columns:1fr}
  .interp-grid{grid-template-columns:1fr}
  .year-row{gap:12px}
}

</head>
<body>
<div id="app"></div>
<script>
const COLORS=["#2ecc71","#3498db","#e67e22","#9b59b6","#e74c3c","#1abc9c","#f39c12","#16a085","#8e44ad","#d35400","#27ae60","#c0392b"];
const SVG_NS="http://www.w3.org/2000/svg";
const SVG_TAGS=new Set(["svg","line","text","polyline","circle","rect","polygon"]);

function parseCSVText(text){
  const rows=[]; let row=[],cell="",inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(ch==='"'){ if(inQuotes&&next==='"'){cell+='"';i++;} else inQuotes=!inQuotes; }
    else if(ch===','&&!inQuotes){ row.push(cell); cell=""; }
    else if((ch==='\n'||ch==='\r')&&!inQuotes){
      if(ch==='\r'&&next==='\n')i++;
      row.push(cell); cell="";
      if(row.some(v=>String(v).trim()!==""))rows.push(row);
      row=[];
    } else cell+=ch;
  }
  row.push(cell);
  if(row.some(v=>String(v).trim()!==""))rows.push(row);
  if(!rows.length)return [];
  const headers=rows[0].map(v=>String(v).trim());
  return rows.slice(1).map(cols=>{
    const obj={};
    headers.forEach((h,idx)=>{
      const raw=cols[idx] ?? "", trimmed=String(raw).trim();
      if(trimmed==="")obj[h]=null;
      else if(/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(trimmed))obj[h]=Number(trimmed);
      else obj[h]=trimmed;
    });
    return obj;
  });
}

async function fetchTextFile(path){
  const res=await fetch(path,{cache:"no-store"});
  if(!res.ok)throw new Error(`Bestand niet gevonden: ${path}`);
  return await res.text();
}

async function tryAutoLoadCsv(paths,type){
  for(const path of paths){
    try{
      const text=await fetchTextFile(path);
      processMsiCSV(parseCSVText(text),type);
      return true;
    }catch(_err){}
  }
  return false;
}

async function tryAutoLoadTrendCsv(paths,type){
  for(const path of paths){
    try{
      const text=await fetchTextFile(path);
      processTrendCSV(parseCSVText(text),type);
      return true;
    }catch(_err){}
  }
  return false;
}

async function autoLoadFromSameFolder(){
  const sqlCandidates=["Meijendel.sql","meijendel.sql"];
  let sqlLoaded=false;

  for(const path of sqlCandidates){
    try{
      const sqlText=await fetchTextFile(path);
      setState({status:"loading",error:""});
      processFile(sqlText);
      sqlLoaded=true;
      break;
    }catch(_err){}
  }

  await Promise.all([
    tryAutoLoadTrendCsv(["soortindices_bruikbare_tijdreeks.csv","trim/soorten/soortindices_bruikbare_tijdreeks.csv"],"trim_idx"),
    tryAutoLoadTrendCsv(["soorten_trendoverzicht_bruikbare_tijdreeks.csv","trim/soorten/soorten_trendoverzicht_bruikbare_tijdreeks.csv"],"trim_trend"),
    tryAutoLoadCsv(["gam_voorspellingen_per_groep.csv","output_ecologische_groepen/gam_voorspellingen_per_groep.csv"],"voorsp"),
    tryAutoLoadCsv(["gam_interpretatie_per_groep.csv","output_ecologische_groepen/gam_interpretatie_per_groep.csv"],"interp"),
    tryAutoLoadCsv(["msi_per_groep_per_jaar.csv","trim_msi_evg/msi_per_groep_per_jaar.csv"],"trim_msi"),
    tryAutoLoadCsv(["trendoverzicht_msi_groepen.csv","trim_msi_evg/trendoverzicht_msi_groepen.csv"],"trim_trend"),
    tryAutoLoadCsv(["gam_voorspellingen_msi_groepen.csv","trim_msi_evg/gam_voorspellingen_msi_groepen.csv"],"trim_gam_pred"),
    tryAutoLoadCsv(["gam_interpretatie_msi_groepen.csv","trim_msi_evg/gam_interpretatie_msi_groepen.csv"],"trim_gam_interp")
  ]);

  if(!sqlLoaded&&S.status==="idle")render();
}

function el(tag,attrs,children){
  const e=SVG_TAGS.has(tag)?document.createElementNS(SVG_NS,tag):document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className"||k==="class")e.setAttribute("class",v);
    else e.setAttribute(k,v);
  });
  if(children)(Array.isArray(children)?children:[children]).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

function renderSimpleChart(containerId,config){
  const container=document.getElementById(containerId);
  if(!container)return;
  container.innerHTML="";
  const labels=config.labels||[];
  const datasets=(config.datasets||[]).filter(ds=>Array.isArray(ds.data)&&ds.data.some(v=>typeof v==="number"&&!Number.isNaN(v)));
  if(!labels.length||!datasets.length){
    container.appendChild(el("div",{className:"chart-empty"},"Geen gegevens beschikbaar voor deze selectie."));
    return;
  }
  const width=900,height=360,margin={top:20,right:18,bottom:52,left:60};
  const innerW=width-margin.left-margin.right,innerH=height-margin.top-margin.bottom;
  const values=datasets.flatMap(ds=>ds.data).filter(v=>typeof v==="number"&&!Number.isNaN(v));
  let min=Math.min(...values),max=Math.max(...values);
  if(min===max){const pad=min===0?1:Math.abs(min)*0.1;min-=pad;max+=pad;}
  const range=max-min;
  const outerPad=range===0?1:range*0.08;
  min-=outerPad;
  max+=outerPad;
  const ticks=5;
  const xAt=i=>margin.left+(labels.length===1?innerW/2:(i*(innerW/(labels.length-1))));
  const yAt=v=>margin.top+innerH-((v-min)/(max-min))*innerH;
  const svg=el("svg",{class:"chart-svg",viewBox:`0 0 ${width} ${height}`,preserveAspectRatio:"none"});
  svg.appendChild(el("rect",{x:margin.left,y:margin.top,width:innerW,height:innerH,rx:8,class:"chart-frame"}));
  for(let i=0;i<ticks;i++){
    const value=min+((max-min)/(ticks-1))*i, y=yAt(value);
    svg.appendChild(el("line",{x1:margin.left,y1:y,x2:width-margin.right,y2:y,class:"chart-grid"}));
    svg.appendChild(el("text",{x:margin.left-8,y:y+4,"text-anchor":"end",class:"chart-label"},value.toLocaleString("nl-NL",{maximumFractionDigits:3})));
  }
  svg.appendChild(el("line",{x1:margin.left,y1:margin.top,x2:margin.left,y2:height-margin.bottom,class:"chart-axis"}));
  svg.appendChild(el("line",{x1:margin.left,y1:height-margin.bottom,x2:width-margin.right,y2:height-margin.bottom,class:"chart-axis"}));
  const maxXLabels=10;
  const xStep=Math.max(1,Math.ceil(labels.length/maxXLabels));
  labels.forEach((label,i)=>{
    if(i % xStep !== 0 && i !== labels.length - 1)return;
    svg.appendChild(el("text",{x:xAt(i),y:height-margin.bottom+20,"text-anchor":"middle",class:"chart-label"},String(label)));
  });
  if(config.yTitle)svg.appendChild(el("text",{x:16,y:height/2,transform:`rotate(-90 16 ${height/2})`,class:"chart-title","text-anchor":"middle"},config.yTitle));
  (config.bands||[]).forEach(band=>{
    const upperPoints=band.upper.map((v,i)=>typeof v==="number"&&!Number.isNaN(v)?`${xAt(i)},${yAt(v)}`:null).filter(Boolean);
    const lowerPoints=band.lower.map((v,i)=>typeof v==="number"&&!Number.isNaN(v)?`${xAt(i)},${yAt(v)}`:null).filter(Boolean).reverse();
    if(!upperPoints.length||!lowerPoints.length)return;
    svg.appendChild(el("polygon",{points:[...upperPoints,...lowerPoints].join(" "),fill:band.fill||"rgba(59,130,246,0.16)",stroke:"none"}));
  });
  datasets.forEach(ds=>{
    const points=ds.data.map((v,i)=>typeof v==="number"&&!Number.isNaN(v)?`${xAt(i)},${yAt(v)}`:null).filter(Boolean);
    if(!points.length)return;
    if(ds.showLine!==false){
      svg.appendChild(el("polyline",{points:points.join(" "),class:`chart-line${ds.dashed?" chart-dashed":""}`,stroke:ds.color||"#3498db","stroke-width":ds.dashed ? "1.8" : (ds.bold ? "3.2" : "2.8")}));
    }
    if(ds.showPoints!==false){
      ds.data.forEach((v,i)=>{ if(typeof v!=="number"||Number.isNaN(v))return; svg.appendChild(el("circle",{cx:xAt(i),cy:yAt(v),r:ds.pointRadius || 3.2,class:"chart-point",fill:ds.color||"#3498db"})); });
    }
  });
  container.appendChild(svg);
  const legend=el("div",{className:"chart-legend"});
  datasets.forEach(ds=>legend.appendChild(el("div",{className:"legend-item"},[
    el("span",{className:`legend-line${ds.dashed?" legend-dashed":""}`,style:{borderTopColor:ds.color||"#3498db"}}),
    el("span",{},ds.label||"Reeks")
  ])));
  container.appendChild(legend);
}

function splitCSV(s){const r=[];let c="",q=false;for(let i=0;i<s.length;i++){const ch=s[i];if(ch==="'"&&s[i-1]!=="\\"){q=!q;c+=ch;}else if(ch===","&&!q){r.push(c);c="";}else c+=ch;}r.push(c);return r;}
function clean(v){if(v==null)return null;v=v.trim();if(v==="NULL"||v==="null")return null;if(v.startsWith("'")&&v.endsWith("'"))return v.slice(1,-1).replace(/\\'/g,"'");const n=Number(v);return isNaN(n)?v:n;}
function parseDump(sql){
  const tables={};
  const re=/INSERT INTO\s+`?([^`\s(]+)`?\s+\(([^)]+)\)\s+VALUES\s*([\s\S]+?)(?=;\s*(?:INSERT|CREATE|DROP|ALTER|SET|\/\*|--)|;\s*$)/gi;
  let m;
  while((m=re.exec(sql))!==null){
    const tbl=m[1].toLowerCase(),cols=m[2].split(",").map(c=>c.trim().replace(/`/g,""));
    if(!tables[tbl])tables[tbl]={columns:cols,rows:[]};
    const tr=/\(([^)]*(?:'[^']*'[^)]*)*)\)/g;let tv;
    while((tv=tr.exec(m[3]))!==null){const row={};splitCSV(tv[1]).forEach((v,i)=>{row[cols[i]]=clean(v);});tables[tbl].rows.push(row);}
  }
  return tables;
}
function toYear(v){if(!v)return null;const m=String(v).match(/\b(19|20)\d{2}\b/);return m?parseInt(m[0]):null;}
function guessRoles(cols){const r={};cols.forEach(c=>{const l=c.toLowerCase();if(/jaar|year/.test(l))r[c]="year";else if(/datum|date/.test(l))r[c]="date";else if(/soort|species|vogel|bird|neder/.test(l))r[c]="species";else if(/territ|aantal|count|total|geteld/.test(l))r[c]="count";else if(/kavel|plot|locatie|hok/.test(l))r[c]="location";else if(/id$/.test(l)||l==="id")r[c]="id";else r[c]="other";});return r;}
function pickMain(tables){return Object.entries(tables).sort((a,b)=>{const sc=t=>{const r=Object.values(guessRoles(t.columns));return(r.includes("species")?2:0)+(r.includes("year")||r.includes("date")?2:0)+(r.includes("count")?2:0)+t.rows.length*1e-4;};return sc(b[1])-sc(a[1]);})[0];}
function buildNameMap(tables,mainName){for(const[name,tbl]of Object.entries(tables)){if(name===mainName)continue;const id=tbl.columns.find(c=>/^id$/i.test(c)),nm=tbl.columns.find(c=>/neder|dutch|naam/i.test(c))||tbl.columns.find(c=>/soort|species|vogel/i.test(c));if(id&&nm&&tbl.rows.length){const map={};tbl.rows.forEach(r=>{if(r[id]!=null)map[String(r[id])]=r[nm];});return{map,id,nm,rows:tbl.rows,cols:tbl.columns};}}return null;}
function buildKavelMap(tables){const t=tables["plots"];if(!t)return null;const id=t.columns.find(c=>/^id$/i.test(c))||t.columns[0],kn=t.columns.find(c=>/kavel_nummer/i.test(c));if(!id||!kn)return null;const map={};t.rows.forEach(r=>{if(r[id]!=null)map[String(r[id])]=r[kn];});return map;}
function buildAreaMeta(tables,kavelMap){
  const t=tables["plot_jaar_oppervlak"]; if(!t)return null;
  const pc=t.columns.find(c=>/^plot_id$/i.test(c)),yc=t.columns.find(c=>/^jaar$/i.test(c)),ac=t.columns.find(c=>/oppervlakte.*km2/i.test(c));
  if(!pc||!yc||!ac)return null;
  const areasByYear={};
  t.rows.forEach(r=>{
    const jaar=toYear(r[yc]),plotRaw=r[pc],area=Number(r[ac]);
    if(!jaar||plotRaw==null||!Number.isFinite(area)||area<=0)return;
    const plotKey=String(kavelMap?.[String(plotRaw)]??plotRaw);
    if(!areasByYear[jaar])areasByYear[jaar]={};
    areasByYear[jaar][plotKey]=area;
  });
  const countedByYear={};
  const ct=tables["plot_jaar_teller"];
  if(ct){
    const cpc=ct.columns.find(c=>/^plot_id$/i.test(c)),cyc=ct.columns.find(c=>/^jaar$/i.test(c));
    if(cpc&&cyc){
      ct.rows.forEach(r=>{
        const jaar=toYear(r[cyc]),plotRaw=r[cpc];
        if(!jaar||plotRaw==null)return;
        const plotKey=String(kavelMap?.[String(plotRaw)]??plotRaw);
        if(!countedByYear[jaar])countedByYear[jaar]=new Set();
        countedByYear[jaar].add(plotKey);
      });
    }
  }
  return {areasByYear,countedByYear,hasCountedYears:Object.keys(countedByYear).length>0};
}
function getAreaForYear(areaMeta,jaar,selectedPlots){
  if(!areaMeta)return null;
  const yearAreas=areaMeta.areasByYear?.[jaar];
  if(!yearAreas)return null;
  let plots=Object.keys(yearAreas);
  if(selectedPlots?.length)plots=plots.filter(p=>selectedPlots.includes(String(p)));
  const counted=areaMeta.countedByYear?.[jaar];
  if(counted?.size)plots=plots.filter(p=>counted.has(String(p)));
  const total=plots.reduce((sum,p)=>sum+(Number(yearAreas[p])||0),0);
  return total>0?total:null;
}
function buildGroepMap(tables,lookup){
  if(!lookup)return{};
  const k=tables["evg_vogel_landschapgroep"];if(!k)return{};
